$text     = rgba(cdd6f4ee)
$subtext  = rgba(a6adc8bb)
$accent   = rgba(89b4fadd)
$pill     = rgba(1e1e2e77)
$dots_col = rgba(cdd6f4ff)
$fail_col = rgba(f38ba8ff)
$chk_col  = rgba(a6e3a1ff)
$caps_col = rgba(fab387ff)

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  GENERAL
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
general {
    no_fade_in          = false
    no_fade_out         = false
    hide_cursor         = true
    grace               = 0
    disable_loading_bar = true
    ignore_empty_input  = true
}

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  BACKGROUND
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
background {
    monitor           =
    path              = /home/mishaz/Pictures/papers/wallpaperflare.com_wallpaper (18).jpg
    blur_passes       = 2
    blur_size         = 4
    noise             = 0.010
    contrast          = 0.88
    brightness        = 0.68
    vibrancy          = 0.12
    vibrancy_darkness = 0.0
}



# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  TOP-RIGHT — Battery + Network
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
label {
    monitor       =
    text          = cmd[update:5000] echo "$(cat /sys/class/power_supply/BAT0/capacity 2>/dev/null || echo "N/A")%  $(cat /sys/class/power_supply/BAT0/status 2>/dev/null | sed 's/Discharging/󰂃/;s/Charging/󰂄/;s/Full/󰁹/')"
    color         = $subtext
    font_size     = 15
    font_family   = Geist Mono
    halign        = right
    valign        = top
    position      = -80, -72
    shadow_passes = 1
    shadow_size   = 3
    shadow_color  = rgba(00000055)
}

label {
    monitor       =
    text          = cmd[update:5000] echo "󰖩  $(ip route get 1.1.1.1 2>/dev/null | awk '{print $7; exit}' | grep -v '^$' || echo "offline")"
    color         = $subtext
    font_size     = 15
    font_family   = Geist Mono
    halign        = right
    valign        = top
    position      = -80, -100
    shadow_passes = 1
    shadow_size   = 3
    shadow_color  = rgba(00000055)
}

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  CENTER — Profile Picture
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

image {
    monitor =
    path = /home/mishaz/Pictures/pfp/_ (6).jpeg

    size = 108

    rounding = 9999
    border_size = 0

    position = 0, -5
    halign = center

    preserve_aspect = false

    shadow_passes = 4
    shadow_size = 16
    shadow_color = rgba(00000066)

    opacity = 0.95
}

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  CENTER — Username
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ 

label {
    monitor =
    text =[ $USER ]

    color = $subtext
    font_size = 14
    font_family = Geist Mono

    halign = center    
    position = 0, -80   # 👈 moves it just below image

    background_color = rgba(15,15,25,0.4)   # match waybar glass
    background_corner_radius = 14
    background_padding_h = 14
    background_padding_v = 6

    shadow_passes = 2
    shadow_size = 6
    shadow_color = rgba(00000055)
}

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  CENTER — Password Input
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
input-field {
    monitor           =
    size              = 260, 48
    outline_thickness = 0
    dots_size         = 0.22
    dots_spacing      = 0.28
    dots_center       = true
    dots_rounding     = -1
    dots_color        = $dots_col
    inner_color       = $pill
    outer_color       = rgba(00000000)
    font_color        = $text
    font_family       = Geist Mono
    fade_on_empty     = true
    fade_timeout      = 1200
    placeholder_text  = <span foreground="##a6adc8aa"> Enter Password</span>
    rounding          = 24
    check_color       = $chk_col
    fail_color        = $fail_col
    fail_text         =
    capslock_color    = $caps_col
    halign            = center
    valign            = center
    position          = 0, -122
}



