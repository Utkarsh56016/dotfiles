# ===============================
# HYPRLAND FINAL CONFIG (SAFE + AESTHETIC)
# ===============================

monitor=,preferred,auto,1.2

###################
### MY PROGRAMS ###
###################

$terminal = kitty
$fileManager = thunar
$menu = wofi --show drun --width 450 --height 350 --allow-images false
#$menu = wofi --show run --width 400 --height 200  

#################
### AUTOSTART ###
#################

exec-once = nm-applet
exec-once = waybar -c ~/.config/hypr/waybar/config -s ~/.config/hypr/waybar/style.css
#exec-once = hyprpaper -c ~/.config/hypr/hyprpaper.conf
exec-once = dunst
exec-once = sh -c "sleep 1 && notify-send 'Welcome, Andrew Mishaz' 'System initialized successfully'"
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
exec-once = awww-daemon
#exec-once = flameshot &

#############################
### ENVIRONMENT VARIABLES ###
#############################

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24

#####################
### LOOK AND FEEL ###
#####################

general {
    gaps_in = 6
    gaps_out = 18
    border_size = 1

    col.active_border = rgb(9298A3)
    col.inactive_border = rgba(1e1e2eaa)

    resize_on_border = false
    allow_tearing = false

    layout = dwindle
}

decoration {
    rounding = 12
    rounding_power = 2

    active_opacity = 0.95
    inactive_opacity = 0.85

    blur {
    	enabled = true
    	size = 12
    	passes = 3
    	vibrancy = 0.2
    	ignore_opacity = true
    }

    shadow {
        enabled = false
    }
}

animations {
    enabled = yes

    bezier = smooth, 0.25, 0.9, 0.2, 1.0

    animation = windows, 1, 6, smooth
    animation = fade, 1, 5, default
    animation = border, 1, 5, default
    animation = workspaces, 1, 5, default
}

dwindle {
    pseudotile = true
    preserve_split = true
}

master {
    new_status = master
}

misc {
    force_default_wallpaper = -1
    disable_hyprland_logo = true
}

#############
### INPUT ###
#############

input {
    kb_layout = us
    follow_mouse = 1
    sensitivity = 0

    touchpad {
        natural_scroll = false
    }
}

gesture = 3, horizontal, workspace

###################
### KEYBINDINGS ###
###################

$mainMod = SUPER

bind = SUPER, slash, exec, ~/tool_script/run-dashboard.sh
#bind = $mainMod, PRINT, exec, flameshot gui
bind = , PRINT, exec, grim -g "$(slurp)" - | swappy -f -
#bind = $mainMod, slash, exec, ~/.config/hypr/scripts/cheatsheet.zsh | rofi -dmenu -theme ~/.config/rofi/cheatsheet.rasi

# --- ORIGINAL BINDS (UNCHANGED) ---
bind = $mainMod, Q, exec, brave
bind = $mainMod, C, killactive,
bind = $mainMod, M, exec, command -v hyprshutdown >/dev/null 2>&1 && hyprshutdown || hyprctl dispatch exit
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, V, togglefloating,
bind = $mainMod, R, exec, $menu
bind = $mainMod, P, pseudo,
bind = $mainMod, J, layoutmsg, togglesplit
bind = $mainMod, L, exec, hyprlock
#bind = $mainMod, X, exec, wlogout -b 5
bind = $mainMod, X, exec, ~/.config/hypr/scripts/powermenu.sh

# Fullscreen toggle
bind = $mainMod, F, fullscreen, 0

# Cycle fullscreen windows
bind = $mainMod, TAB, exec, hyprctl dispatch cyclenext && hyprctl dispatch fullscreen 1
bind = $mainMod SHIFT, TAB, exec, hyprctl dispatch cycleprev && hyprctl dispatch fullscreen 1

# Optional grouping (tab-like)
bind = $mainMod, G, togglegroup

# --- SAFE ADDITIONS (NO CONFLICT) ---
#bind = $mainMod, SPACE, exec, 
bind = $mainMod, RETURN, exec, $terminal
bind = $mainMod SHIFT, E, exec, glava

# --- FOCUS MOVEMENT ---
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# --- WORKSPACES ---
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# --- MOVE WINDOWS TO WORKSPACES ---
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# --- SCRATCHPAD ---
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# --- SCROLL WORKSPACES ---
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# --- MOUSE ---
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# --- AUDIO / BRIGHTNESS ---
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

# --- MEDIA ---
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

##############################
### WINDOW RULES ###
##############################

windowrule {
    name = suppress-maximize-events
    match:class = .*
    suppress_event = maximize
}

windowrule {
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false
    no_focus = true
}

windowrule {
    name = move-hyprland-run
    match:class = hyprland-run
    move = 20 monitor_h-120
    float = yes
}

